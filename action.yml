name: 'Changelog to Release'
description: 'Generate release notes from CHANGELOG.md with download tables, commit history and so on'
author: 'EggRoll'

inputs:
  version:
    description: 'Current release version'
    required: true
  previous_tag:
    description: 'Previous version tag for commit range'
    required: false
    default: ''
  changelog_path:
    description: 'Path to CHANGELOG file'
    required: false
    default: 'CHANGELOG.md'
  repo:
    description: 'Repository name (owner/repo)'
    required: true
  binary_name:
    description: 'Binary file name'
    required: false
    default: 'app-name'
  include_download_table:
    description: 'Include download table in release notes'
    required: false
    default: 'true'
  platforms:
    description: 'Comma-separated list of platforms (linux,darwin,windows,freebsd)'
    required: false
    default: 'linux,darwin,windows,freebsd'
  architectures:
    description: 'Comma-separated list of architectures (386,amd64,arm,arm64)'
    required: false
    default: '386,amd64,arm,arm64'
  include_changelog:
    description: 'Include changelog content in release notes'
    required: false
    default: 'true'
  include_commits:
    description: 'Include commit history in release notes'
    required: false
    default: 'true'
  include_install_guide:
    description: 'Include installation guide at the end'
    required: false
    default: 'true'

outputs:
  content:
    description: 'Generated release notes content'
    value: ${{ steps.release.outputs.content }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - id: release
      name: Generate release notes
      shell: bash
      run: node ${{ github.action_path }}/index.js
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_PREVIOUS_TAG: ${{ inputs.previous_tag }}
        INPUT_CHANGELOG_PATH: ${{ inputs.changelog_path }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_BINARY_NAME: ${{ inputs.binary_name }}
        INPUT_INCLUDE_DOWNLOAD_TABLE: ${{ inputs.include_download_table }}
        INPUT_PLATFORMS: ${{ inputs.platforms }}
        INPUT_ARCHITECTURES: ${{ inputs.architectures }}
        INPUT_INCLUDE_CHANGELOG: ${{ inputs.include_changelog }}
        INPUT_INCLUDE_COMMITS: ${{ inputs.include_commits }}
        INPUT_INCLUDE_INSTALL_GUIDE: ${{ inputs.include_install_guide }}