name: 'Changelog to Release'
description: 'Generate release notes from CHANGELOG.md with download tables, commit history and so on'
author: 'EggRoll'

inputs:
  version:
    description: 'Current release version'
    required: true
  previous_tag:
    description: 'Previous version tag for commit range'
    required: false
    default: ''
  changelog_path:
    description: 'Path to CHANGELOG file'
    required: false
    default: 'CHANGELOG.md'
  repo:
    description: 'Repository name (owner/repo)'
    required: true
  binary_name:
    description: 'Binary file name'
    required: false
    default: 'app-name'
  include_download_table:
    description: 'Include download table in release notes'
    required: false
    default: 'true'
  platforms:
    description: 'Comma-separated list of platforms (linux,darwin,windows,freebsd)'
    required: false
    default: 'linux,darwin,windows,freebsd'
  architectures:
    description: 'Comma-separated list of architectures (386,amd64,arm,arm64)'
    required: false
    default: '386,amd64,arm,arm64'
  include_changelog:
    description: 'Include changelog content in release notes'
    required: false
    default: 'true'
  include_commits:
    description: 'Include commit history in release notes'
    required: false
    default: 'true'
  include_install_guide:
    description: 'Include installation guide at the end'
    required: false
    default: 'true'

outputs:
  content:
    description: 'Generated release notes content'
    runs:
      using: 'composite'
      steps:
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - name: Generate release notes
          shell: bash
          run: |
            python3 -c "
            import subprocess
            import os

            result = subprocess.run(
              ['python3', '${{ github.action_path }}/entrypoint.py',
                '--version', '${{ inputs.version }}',
                '--previous-tag', '${{ inputs.previous_tag }}',
                '--changelog-path', '${{ inputs.changelog_path }}',
                '--repo', '${{ inputs.repo }}',
                '--binary-name', '${{ inputs.binary_name }}',
                '--include-download-table', '${{ inputs.include_download_table }}',
                '--platforms', '${{ inputs.platforms }}',
                '--architectures', '${{ inputs.architectures }}',
                '--include-changelog', '${{ inputs.include_changelog }}',
                '--include-commits', '${{ inputs.include_commits }}',
                '--include-install-guide', '${{ inputs.include_install_guide }}'],
              capture_output=True, text=True
            )
            print(f'content={result.stdout}', file=open(os.environ['GITHUB_OUTPUT'], 'a'))
            if result.stderr:
              print(result.stderr, file=sys.stderr)
            "